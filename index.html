<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="מוזיקה">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>ימי שנה מוזיקליים</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--surf:#111;--bdr:#2a2a2a;--acc:#e8ff00;--acc2:#ff3d6b;--txt:#e0e0e0;--muted:#555;--grn:#00ff88;--gold:#ffd700;--blue:#4af;--st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--txt);font-family:'Space Mono',monospace;display:flex;flex-direction:column;background-image:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,.012) 2px,rgba(255,255,255,.012) 4px);}
.hdr{padding:calc(var(--st)+10px) 14px 10px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.hdr-t{font-family:'VT323',monospace;font-size:1.7rem;color:var(--acc);letter-spacing:3px;text-shadow:0 0 12px rgba(232,255,0,.3);}
.hdr-d{font-size:.5rem;color:var(--muted);letter-spacing:2px;}
.ibtn{display:none;background:transparent;border:1px solid var(--acc);color:var(--acc);font-family:'VT323',monospace;font-size:.85rem;padding:3px 9px;cursor:pointer;}
.ibtn.show{display:block;}
.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.screen{display:none;padding:12px 12px 24px;min-height:100%;}
.screen.active{display:block;}
.nav{display:flex;border-top:1px solid var(--bdr);padding-bottom:var(--sb);flex-shrink:0;background:var(--bg);}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 3px;background:transparent;border:none;color:var(--muted);cursor:pointer;font-family:'Space Mono',monospace;}
.nb .ni{font-size:1.1rem;line-height:1;}
.nb .nl{font-size:.4rem;letter-spacing:1px;text-transform:uppercase;}
.nb.on{color:var(--acc);border-top:2px solid var(--acc);margin-top:-1px;}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.chip{background:var(--surf);border:1px solid var(--bdr);color:var(--muted);font-family:'VT323',monospace;font-size:1rem;letter-spacing:1px;padding:5px 12px;cursor:pointer;transition:all .15s;}
.chip.on{border-color:var(--acc);color:var(--acc);background:rgba(232,255,0,.06);}
.mrow{display:flex;gap:6px;align-items:center;margin-bottom:10px;flex-wrap:wrap;}
.trow{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.tog{background:var(--surf);border:1px solid var(--bdr);color:var(--muted);font-family:'Space Mono',monospace;font-size:.55rem;padding:4px 10px;cursor:pointer;letter-spacing:1px;}
.tog.on{border-color:var(--acc);color:var(--acc);background:rgba(232,255,0,.06);}
.frow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;align-items:flex-end;}
.fg{display:flex;flex-direction:column;gap:4px;flex:1;min-width:100px;}
.fg label{font-size:.5rem;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
input,select{background:var(--surf);border:1px solid var(--bdr);color:var(--txt);font-family:'Space Mono',monospace;font-size:.72rem;padding:8px 9px;outline:none;width:100%;border-radius:0;-webkit-appearance:none;}
input:focus,select:focus{border-color:var(--acc);}
.btn{background:var(--acc);color:#000;border:none;font-family:'VT323',monospace;font-size:1.3rem;padding:9px 18px;cursor:pointer;letter-spacing:2px;width:100%;}
.btn:active{background:var(--acc2);color:#fff;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btno{background:transparent;border:1px solid var(--acc);color:var(--acc);font-family:'VT323',monospace;font-size:1.1rem;padding:8px 14px;cursor:pointer;letter-spacing:2px;}
.btno:active{background:var(--acc);color:#000;}
.stbar{font-size:.58rem;letter-spacing:2px;color:var(--grn);min-height:1.3em;margin-bottom:8px;}
.err{color:var(--acc2);font-size:.65rem;padding:9px;border:1px solid var(--acc2);margin-bottom:10px;}
.ldr{display:inline-block;width:6px;height:6px;background:var(--grn);animation:blink .8s infinite;margin-right:5px;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
.sechd{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--bdr);flex-wrap:wrap;gap:4px;}
.sect{font-family:'VT323',monospace;font-size:1.15rem;color:var(--acc);letter-spacing:2px;}
.secs{font-size:.48rem;color:var(--muted);}
.ghd{font-family:'VT323',monospace;font-size:1.2rem;color:var(--acc2);letter-spacing:2px;padding:4px 0;border-bottom:1px solid var(--bdr);margin:14px 0 7px;}
.card{display:grid;grid-template-columns:50px 1fr auto;gap:9px;align-items:center;padding:10px 11px;border:1px solid var(--bdr);margin-bottom:4px;background:var(--surf);cursor:pointer;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;right:0;top:0;bottom:0;width:3px;background:var(--bdr);}
.card:active{border-color:rgba(232,255,0,.35);background:#151515;}
.card:active::before{background:var(--acc);}
.card.r10{border-color:rgba(255,215,0,.4);background:#131100;}
.card.r10::before{background:var(--gold);}
.card.r5{border-color:rgba(255,61,107,.25);}
.card.r5::before{background:var(--acc2);}
.card.r1::before{background:var(--blue);}
.card.bday{border-color:rgba(0,255,136,.15);}
.card.bday::before{background:var(--grn);}
.card.bday.r10{border-color:rgba(255,215,0,.4);}
.cd{text-align:center;border-left:1px solid var(--bdr);padding-right:9px;}
.cdd{font-family:'VT323',monospace;font-size:1.7rem;color:var(--acc);line-height:1;}
.cdw{font-size:.42rem;letter-spacing:1px;color:var(--muted);text-transform:uppercase;}
.ci{min-width:0;}
.cit{font-size:.74rem;font-weight:700;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;unicode-bidi:plaintext;}
.cis{font-size:.58rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;unicode-bidi:plaintext;}
.cm{text-align:left;flex-shrink:0;}
.cy{font-family:'VT323',monospace;font-size:1.05rem;color:var(--acc2);white-space:nowrap;}
.cy.g{color:var(--gold);}
.cy.p{color:var(--acc2);}
.cy.b{color:var(--blue);}
.ca{font-size:.4rem;display:block;text-align:left;color:var(--gold);}
.cb{font-size:.42rem;letter-spacing:1px;color:var(--muted);text-transform:uppercase;display:block;text-align:left;margin-top:1px;}
.cw{font-size:.42rem;color:var(--acc);display:block;text-align:left;}
.cbg{font-size:.42rem;color:var(--grn);display:block;text-align:left;}
.empty{text-align:center;padding:40px 16px;color:var(--muted);font-size:.65rem;letter-spacing:2px;line-height:2;}
.toast{position:fixed;bottom:calc(54px + var(--sb) + 10px);left:50%;transform:translateX(-50%) translateY(70px);background:var(--acc);color:#000;font-family:'VT323',monospace;font-size:1rem;padding:7px 18px;transition:transform .3s;z-index:999;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
@media(min-width:600px){.frow{flex-wrap:nowrap;}.btn{width:auto;}}
</style>
</head>
<body>

<header class="hdr">
  <span class="hdr-t">◈ ימי שנה</span>
  <span class="hdr-d" id="hdrD"></span>
  <button class="ibtn" id="iBtn" onclick="installApp()">+ נייד</button>
</header>

<div class="content" id="content">

  <!-- לוח שנה -->
  <div class="screen active" id="scr-time">
    <div class="chips">
      <span class="chip on" data-t="today" onclick="pickTime(this)">היום</span>
      <span class="chip" data-t="tomorrow" onclick="pickTime(this)">מחר</span>
      <span class="chip" data-t="week" onclick="pickTime(this)">שבוע</span>
      <span class="chip" data-t="month" onclick="pickTime(this)">חודש זה</span>
      <span class="chip" data-t="pick" onclick="pickTime(this)">חודש ▾</span>
    </div>
    <div id="mPickRow" style="display:none;" class="mrow">
      <select id="pMonth" style="max-width:130px;flex:none;"></select>
      <select id="pYear" style="max-width:90px;flex:none;"></select>
    </div>
    <div class="trow">
      <span class="tog on" id="tog-rel" onclick="togType('rel',this)">◈ הוצאות</span>
      <span class="tog on" id="tog-bday" onclick="togType('bday',this)">♪ ימי הולדת</span>
    </div>
    <button class="btn" id="timeBtn" onclick="doTime()">חפש ◈</button>
    <div style="margin-top:10px;">
      <div class="stbar" id="tSt"></div>
      <div id="tErr"></div>
      <div id="tRelRes"></div>
      <div id="tBdRes"></div>
    </div>
  </div>

  <!-- חיפוש -->
  <div class="screen" id="scr-search">
    <div style="display:flex;gap:4px;margin-bottom:12px;border-bottom:1px solid var(--bdr);">
      <button class="nb on" id="sm-title" onclick="sMode('title',this)" style="flex:none;padding:6px 12px;border-top:none;font-size:.5rem;">כותר</button>
      <button class="nb" id="sm-artist" onclick="sMode('artist',this)" style="flex:none;padding:6px 12px;border-top:none;font-size:.5rem;">אמן</button>
    </div>
    <div id="sp-title">
      <div class="frow"><div class="fg"><label>שם אלבום / סינגל</label><input type="text" id="tIn" placeholder="Faith, Blue Monday..." onkeydown="if(event.key==='Enter')doTitle()"></div></div>
      <div class="frow" style="margin-bottom:12px;"><div class="fg"><label>אמן (אופציונלי)</label><input type="text" id="tArt" placeholder="The Cure..." onkeydown="if(event.key==='Enter')doTitle()"></div></div>
      <div style="display:flex;gap:8px;">
        <button class="btn" style="flex:2;" id="tBtn" onclick="doTitle()">חפש ◈</button>
        <button class="btno" onclick="doWiki()">↗ Wiki</button>
      </div>
    </div>
    <div id="sp-artist" style="display:none;">
      <div class="frow"><div class="fg"><label>שם אמן / להקה</label><input type="text" id="aIn" placeholder="The Cure, Siouxsie..." onkeydown="if(event.key==='Enter')doArtist()"></div></div>
      <div class="frow" style="margin-bottom:12px;">
        <div class="fg"><label>חודש</label><select id="aMo"><option value="0">כל החודשים</option></select></div>
        <div class="fg"><label>סוג</label><select id="aType"><option value="">הכל</option><option value="Q208569">אלבום</option><option value="Q134556">סינגל</option><option value="Q169930">EP</option></select></div>
      </div>
      <button class="btn" id="aBtn" onclick="doArtist()">חפש ◈</button>
    </div>
    <div class="stbar" id="sSt"></div>
    <div id="sErr"></div>
    <div id="sRes"></div>
  </div>

</div>

<nav class="nav">
  <button class="nb on" onclick="swScr('time',this)"><span class="ni">◈</span><span class="nl">לוח שנה</span></button>
  <button class="nb" onclick="swScr('search',this)"><span class="ni">⌕</span><span class="nl">חיפוש</span></button>
</nav>
<div class="toast" id="toast"></div>

<script>
var MHE=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
var WD=['א׳','ב׳','ג׳','ד׳','ה׳','ו׳','ש׳'];
var T=new Date();
var curT='today',showRel=true,showBday=true,dP=null;

// Wikidata genre IDs (musical works)
var GENRE_IDS='wd:Q183504 wd:Q1640239 wd:Q205560 wd:Q208909 wd:Q9778 wd:Q11399 wd:Q9585 wd:Q182821 wd:Q1338489 wd:Q4818508 wd:Q41298 wd:Q37073 wd:Q1570894 wd:Q838795 wd:Q37029 wd:Q180377 wd:Q11366 wd:Q484641 wd:Q7749 wd:Q49451 wd:Q203059';
// P31 types for musical releases
var RELEASE_TYPES='wd:Q208569 wd:Q134556 wd:Q169930 wd:Q482994 wd:Q7366';

// INIT
document.getElementById('hdrD').textContent=T.getDate()+' '+MHE[T.getMonth()]+' '+T.getFullYear();
var pm=document.getElementById('pMonth');
MHE.forEach(function(n,i){var o=document.createElement('option');o.value=i+1;o.textContent=n;if(i===T.getMonth())o.selected=true;pm.appendChild(o);});
var py=document.getElementById('pYear');
for(var y=T.getFullYear();y>=T.getFullYear()-1;y--){var oy=document.createElement('option');oy.value=y;oy.textContent=y;py.appendChild(oy);}
var am=document.getElementById('aMo');
MHE.forEach(function(n,i){var o=document.createElement('option');o.value=i+1;o.textContent=n;am.appendChild(o);});

window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();dP=e;document.getElementById('iBtn').classList.add('show');});
function installApp(){if(!dP)return;dP.prompt();dP.userChoice.then(function(){dP=null;document.getElementById('iBtn').classList.remove('show');});}
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(function(){});

function swScr(n,el){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});document.querySelectorAll('.nav .nb').forEach(function(b){b.classList.remove('on');});document.getElementById('scr-'+n).classList.add('active');el.classList.add('on');document.getElementById('content').scrollTop=0;}
function sMode(n,el){['title','artist'].forEach(function(x){document.getElementById('sp-'+x).style.display=x===n?'':'none';document.getElementById('sm-'+x).classList.toggle('on',x===n);});setR('s','');setS('s','');}
function pickTime(el){document.querySelectorAll('.chip').forEach(function(c){c.classList.remove('on');});el.classList.add('on');curT=el.dataset.t;document.getElementById('mPickRow').style.display=curT==='pick'?'flex':'none';}
function togType(t,el){el.classList.toggle('on');if(t==='rel')showRel=el.classList.contains('on');else showBday=el.classList.contains('on');}

function setS(p,m){var e=document.getElementById(p==='t'?'tSt':'sSt');if(e)e.innerHTML=m?'<span class="ldr"></span>'+m:'';}
function setE(p,m){var e=document.getElementById(p==='t'?'tErr':'sErr');if(e)e.innerHTML=m?'<div class="err">'+m+'</div>':'';}
function setR(p,h,sub){if(p==='t'){document.getElementById(sub==='bd'?'tBdRes':'tRelRes').innerHTML=h;}else{document.getElementById('sRes').innerHTML=h;}}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function parseD(s){if(!s)return null;var p=s.split('T')[0].split('-');if(p.length<2)return null;return{year:parseInt(p[0]),month:parseInt(p[1]),day:p[2]?parseInt(p[2]):null};}
function annT(year){var n=T.getFullYear()-year;if(n<=0)return null;if(n%10===0)return'10';if(n%5===0)return'5';return'1';}
function annSc(year){var t=annT(year);return t==='10'?0:t==='5'?1:2;}

function getMonths(){
  var s=new Date(T),e=new Date(T);
  if(curT==='tomorrow'){s=new Date(T.getFullYear(),T.getMonth(),T.getDate()+1);e=new Date(s);}
  else if(curT==='week'){e=new Date(T.getFullYear(),T.getMonth(),T.getDate()+6);}
  else if(curT==='month'){e=new Date(T.getFullYear(),T.getMonth()+1,0);}
  else if(curT==='pick'){var mo=parseInt(document.getElementById('pMonth').value)-1,yr=parseInt(document.getElementById('pYear').value);s=new Date(yr,mo,1);e=new Date(yr,mo+1,0);}
  var months=[],d=new Date(s.getFullYear(),s.getMonth(),1);
  while(d<=e){var m=d.getMonth()+1;if(months.indexOf(m)===-1)months.push(m);d=new Date(d.getFullYear(),d.getMonth()+1,1);}
  return months;
}
function getDay(){if(curT==='today')return T.getDate();if(curT==='tomorrow')return T.getDate()+1;return null;}

// ── WIKIDATA SPARQL ──
var WD_URL='https://query.wikidata.org/sparql';
var WD_UA='MusicAnniversaries/3.0 (artemissia-pixel.github.io/Music-Calendar)';

async function wdQuery(sparql){
  var url=WD_URL+'?query='+encodeURIComponent(sparql)+'&format=json';
  var res=await fetch(url,{headers:{'Accept':'application/sparql-results+json','User-Agent':WD_UA}});
  if(!res.ok)throw new Error('Wikidata '+res.status);
  return res.json();
}

// הוצאות מוזיקליות לפי חודשים
async function wdReleases(months,day){
  var mf='VALUES ?m {'+months.map(function(m){return'"'+m+'"^^xsd:integer';}).join(' ')+'}';
  var df=day?'FILTER(DAY(?date)='+day+')\n':'';
  var q='PREFIX wd:<http://www.wikidata.org/entity/>\n'
    +'PREFIX wdt:<http://www.wikidata.org/prop/direct/>\n'
    +'PREFIX xsd:<http://www.w3.org/2001/XMLSchema#>\n'
    +'SELECT DISTINCT ?item ?itemLabel ?artist ?artistLabel ?date ?typeLabel WHERE{\n'
    +'  VALUES ?type{'+RELEASE_TYPES+'}\n'
    +'  ?item wdt:P31 ?type;\n'
    +'        wdt:P577 ?date;\n'
    +'        wdt:P136 ?genre.\n'
    +'  VALUES ?genre{'+GENRE_IDS+'}\n'
    +'  BIND(MONTH(?date) AS ?m)\n'
    +'  '+mf+'\n'
    +'  '+df
    +'  FILTER(YEAR(?date)>=1960 && YEAR(?date)<=2010)\n'
    +'  OPTIONAL{?item wdt:P175 ?artist}\n'
    +'  SERVICE wikibase:label{bd:serviceParam wikibase:language "en,he".}\n'
    +'}ORDER BY ?m DAY(?date) YEAR(?date)\nLIMIT 200';
  var data=await wdQuery(q);
  var seen=new Set();
  return data.results.bindings.map(function(b){
    var d=parseD(b.date?b.date.value:null);
    if(!d)return null;
    var title=b.itemLabel?b.itemLabel.value:'?';
    var artist=b.artistLabel?b.artistLabel.value:(b.artist?b.artist.value.split('/').pop():'?');
    if(/^Q\d+$/.test(title))return null;
    var key=title+'||'+artist;
    if(seen.has(key))return null;
    seen.add(key);
    var type=b.typeLabel?b.typeLabel.value:'Release';
    var typeHe=type==='album'||type==='studio album'?'Album':type==='single'?'Single':type==='EP'||type==='extended play'?'EP':'Release';
    return{title:title,artist:artist,year:d.year,month:d.month,day:d.day||1,type:typeHe};
  }).filter(Boolean);
}

// ימי הולדת מוזיקאים
async function wdBdays(months,day){
  var mf='VALUES ?m {'+months.map(function(m){return'"'+m+'"^^xsd:integer';}).join(' ')+'}';
  var df=day?'FILTER(DAY(?bdate)='+day+')\n':'';
  var genreIds='wd:Q183504 wd:Q1640239 wd:Q205560 wd:Q208909 wd:Q9778 wd:Q11399 wd:Q9585 wd:Q182821 wd:Q1338489 wd:Q4818508 wd:Q41298 wd:Q37073 wd:Q1570894 wd:Q838795 wd:Q37029 wd:Q180377 wd:Q11366 wd:Q484641';
  var q='PREFIX wd:<http://www.wikidata.org/entity/>\n'
    +'PREFIX wdt:<http://www.wikidata.org/prop/direct/>\n'
    +'PREFIX xsd:<http://www.w3.org/2001/XMLSchema#>\n'
    +'SELECT DISTINCT ?person ?personLabel ?bdate ?desc WHERE{\n'
    +'  ?person wdt:P31 wd:Q5;wdt:P106 ?occ;wdt:P569 ?bdate.\n'
    +'  VALUES ?occ{wd:Q177220 wd:Q36834 wd:Q488205 wd:Q134556 wd:Q855091 wd:Q183945 wd:Q753110 wd:Q215380}\n'
    +'  BIND(MONTH(?bdate) AS ?m)\n'
    +'  '+mf+'\n'
    +'  '+df
    +'  FILTER(YEAR(?bdate)>1900)\n'
    +'  FILTER NOT EXISTS{?person wdt:P570 ?dod}\n'
    +'  ?person schema:description ?desc FILTER(LANG(?desc)="en")\n'
    +'  ?person wdt:P136 ?genre.\n'
    +'  VALUES ?genre{'+genreIds+'}\n'
    +'  SERVICE wikibase:label{bd:serviceParam wikibase:language "en,he".}\n'
    +'}ORDER BY ?m DAY(?bdate) ?personLabel\nLIMIT 120';
  var data=await wdQuery(q);
  var seen=new Set();
  return data.results.bindings.map(function(b){
    var name=b.personLabel?b.personLabel.value:'?';
    if(/^Q\d+$/.test(name)||seen.has(name))return null;
    seen.add(name);
    var d=parseD(b.bdate?b.bdate.value:null);
    if(!d)return null;
    return{name:name,year:d.year,month:d.month,day:d.day||1,desc:b.desc?b.desc.value:'מוזיקאי'};
  }).filter(Boolean);
}

// חיפוש לפי כותר
async function wdTitle(title,artist){
  var artistFilter=artist?'?item wdt:P175 ?a. ?a rdfs:label ?al FILTER(CONTAINS(LCASE(?al),LCASE("'+artist.replace(/"/g,'')+'"))).':'';
  var q='PREFIX wd:<http://www.wikidata.org/entity/>\n'
    +'PREFIX wdt:<http://www.wikidata.org/prop/direct/>\n'
    +'SELECT DISTINCT ?item ?itemLabel ?artist ?artistLabel ?date ?typeLabel WHERE{\n'
    +'  VALUES ?type{'+RELEASE_TYPES+'}\n'
    +'  ?item wdt:P31 ?type;wdt:P577 ?date.\n'
    +'  ?item rdfs:label ?label FILTER(CONTAINS(LCASE(?label),LCASE("'+title.replace(/"/g,'')+'"))).\n'
    +'  '+artistFilter+'\n'
    +'  OPTIONAL{?item wdt:P175 ?artist}\n'
    +'  SERVICE wikibase:label{bd:serviceParam wikibase:language "en,he".}\n'
    +'}ORDER BY ?date\nLIMIT 20';
  var data=await wdQuery(q);
  var seen=new Set();
  return data.results.bindings.map(function(b){
    var d=parseD(b.date?b.date.value:null);
    if(!d)return null;
    var t=b.itemLabel?b.itemLabel.value:'?';
    var a=b.artistLabel?b.artistLabel.value:'?';
    if(/^Q\d+$/.test(t))return null;
    var key=t+'||'+a;if(seen.has(key))return null;seen.add(key);
    var type=b.typeLabel?b.typeLabel.value:'Release';
    return{title:t,artist:a,year:d.year,month:d.month,day:d.day||1,type:type};
  }).filter(Boolean);
}

// חיפוש לפי אמן
async function wdArtist(artistName,month,typeId){
  var typeFilter=typeId?'VALUES ?type{wd:'+typeId.replace('wd:','')+'}':'VALUES ?type{'+RELEASE_TYPES+'}';
  var monthFilter=month?'FILTER(MONTH(?date)='+month+')':'';
  var q='PREFIX wd:<http://www.wikidata.org/entity/>\n'
    +'PREFIX wdt:<http://www.wikidata.org/prop/direct/>\n'
    +'SELECT DISTINCT ?item ?itemLabel ?date ?typeLabel WHERE{\n'
    +'  ?artist rdfs:label ?al FILTER(CONTAINS(LCASE(?al),LCASE("'+artistName.replace(/"/g,'')+'"))).\n'
    +'  ?artist wdt:P31/wdt:P279* wd:Q5|wd:Q215380.\n'
    +'  '+typeFilter+'\n'
    +'  ?item wdt:P31 ?type;wdt:P577 ?date;wdt:P175 ?artist.\n'
    +'  '+monthFilter+'\n'
    +'  SERVICE wikibase:label{bd:serviceParam wikibase:language "en,he".}\n'
    +'}ORDER BY ?date\nLIMIT 80';
  var data=await wdQuery(q);
  var seen=new Set();
  return data.results.bindings.map(function(b){
    var d=parseD(b.date?b.date.value:null);
    if(!d)return null;
    var t=b.itemLabel?b.itemLabel.value:'?';
    if(/^Q\d+$/.test(t))return null;
    if(seen.has(t+'||'+d.year))return null;seen.add(t+'||'+d.year);
    return{title:t,artist:artistName,year:d.year,month:d.month,day:d.day||1,type:b.typeLabel?b.typeLabel.value:'Release'};
  }).filter(Boolean);
}

// ── CARDS ──
function mkCard(r){
  var at=annT(r.year),ya=T.getFullYear()-r.year,dt=new Date(T.getFullYear(),r.month-1,r.day);
  var cc='card'+(at==='10'?' r10':at==='5'?' r5':' r1');
  var yc=at==='10'?'cy g':at==='5'?'cy p':'cy b';
  var al=at==='10'?'<span class="ca">⬡ יובל עגול</span>':at==='5'?'<span class="ca" style="color:var(--acc2)">◈ חצי יובל</span>':'';
  var tw=r.type==='Album'||r.type==='studio album'?'album':r.type==='Single'||r.type==='single'?'song':'EP';
  var wu='https://en.wikipedia.org/w/index.php?search='+encodeURIComponent(r.title+' '+r.artist+' '+tw)+'&ns0=1';
  var su=wu.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  return'<div class="'+cc+'" onclick="window.open(\''+su+'\',\'_blank\')">'
    +'<div class="cd"><div class="cdd">'+r.day+'</div><div class="cdw">'+WD[dt.getDay()]+'</div></div>'
    +'<div class="ci"><div class="cit" dir="auto">'+esc(r.title)+'</div><div class="cis" dir="auto">'+esc(r.artist)+' · '+r.year+'</div></div>'
    +'<div class="cm"><div class="'+yc+'">'+ya+'Y</div>'+al+'<span class="cb">'+esc(r.type)+'</span><span class="cw">↗ wiki</span></div>'
    +'</div>';
}

function mkBday(p){
  var at=annT(p.year),age=T.getFullYear()-p.year,dt=new Date(T.getFullYear(),p.month-1,p.day);
  var cc='card bday'+(at==='10'?' r10':at==='5'?' r5':'');
  var yc=at==='10'?'cy g':at==='5'?'cy p':'cy';
  var al=at==='10'?'<span class="ca">⬡ יובל עגול</span>':at==='5'?'<span class="ca" style="color:var(--acc2)">◈ חצי</span>':'';
  var wu='https://en.wikipedia.org/w/index.php?search='+encodeURIComponent(p.name)+'&ns0=1';
  var su=wu.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  return'<div class="'+cc+'" onclick="window.open(\''+su+'\',\'_blank\')">'
    +'<div class="cd"><div class="cdd">'+p.day+'</div><div class="cdw">'+WD[dt.getDay()]+'</div></div>'
    +'<div class="ci"><div class="cit" dir="auto">'+esc(p.name)+'</div><div class="cis" dir="auto">'+esc(p.desc)+'</div></div>'
    +'<div class="cm"><div class="'+yc+'">'+age+'</div>'+al+'<span class="cb">'+p.year+'</span><span class="cbg">♪ wiki</span></div>'
    +'</div>';
}

function renderSection(items,prefix,sub,title,isBday){
  if(!items.length){setR(prefix,'<div class="empty">לא נמצאו תוצאות</div>',sub);return;}
  items.sort(function(a,b){return annSc(a.year)-annSc(b.year)||a.month-b.month||a.day-b.day;});
  var seen=new Set(),ded=items.filter(function(r){var k=(isBday?r.name:r.title)+'||'+r.year;if(seen.has(k))return false;seen.add(k);return true;});
  var html='<div class="sechd"><span class="sect">'+esc(title)+' · '+ded.length+'</span><span class="secs">⬡ יובל · ◈ חצי · ↗ wiki</span></div>';
  var ms=[...new Set(ded.map(function(r){return r.month;}))].sort(function(a,b){return a-b;});
  if(ms.length>1){ms.forEach(function(m){html+='<div class="ghd">// '+MHE[m-1]+'</div>';ded.filter(function(r){return r.month===m;}).forEach(function(r){html+=isBday?mkBday(r):mkCard(r);});});}
  else{ded.forEach(function(r){html+=isBday?mkBday(r):mkCard(r);});}
  setR(prefix,html,sub);
}

// ── SEARCHES ──
async function doTime(){
  var btn=document.getElementById('timeBtn');btn.disabled=true;
  setE('t','');setR('t','','rel');setR('t','','bd');
  if(!showRel&&!showBday){setE('t','בחרי לפחות סוג אחד');btn.disabled=false;return;}
  var months=getMonths(),dy=getDay();
  setS('t','מחפש...');
  var ps=[];
  if(showRel){ps.push((async function(){try{setS('t','טוען הוצאות...');var r=await wdReleases(months,dy);renderSection(r,'t','rel','◈ הוצאות',false);}catch(e){setE('t','הוצאות: '+e.message);}})());}
  if(showBday){ps.push((async function(){try{var b=await wdBdays(months,dy);renderSection(b,'t','bd','♪ ימי הולדת',true);}catch(e){setE('t','ימי הולדת: '+e.message);}})());}
  await Promise.all(ps);
  setS('t','');btn.disabled=false;
}

async function doTitle(){
  var btn=document.getElementById('tBtn');btn.disabled=true;
  setE('s','');setR('s','');
  var title=document.getElementById('tIn').value.trim(),artist=document.getElementById('tArt').value.trim();
  if(!title){setE('s','הכניסי שם כותר');btn.disabled=false;return;}
  setS('s','מחפש...');
  try{var r=await wdTitle(title,artist);setS('s','');renderSection(r,'s',null,'◈ '+title,false);}
  catch(e){setS('s','');setE('s','שגיאה: '+e.message);}
  btn.disabled=false;
}

function doWiki(){
  var t=document.getElementById('tIn').value.trim(),a=document.getElementById('tArt').value.trim();
  if(!t){setE('s','הכניסי שם כותר');return;}
  window.open('https://en.wikipedia.org/w/index.php?search='+encodeURIComponent(t+(a?' '+a:'')+' album OR single')+'&ns0=1','_blank');
}

async function doArtist(){
  var btn=document.getElementById('aBtn');btn.disabled=true;
  setE('s','');setR('s','');
  var artist=document.getElementById('aIn').value.trim();
  if(!artist){setE('s','הכניסי שם אמן');btn.disabled=false;return;}
  var mo=parseInt(document.getElementById('aMo').value)||0;
  var typeId=document.getElementById('aType').value;
  setS('s','מחפש...');
  try{var r=await wdArtist(artist,mo||null,typeId||null);setS('s','');renderSection(r,'s',null,'◈ '+artist,false);}
  catch(e){setS('s','');setE('s','שגיאה: '+e.message);}
  btn.disabled=false;
}
